<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyIdolo AI Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
 MyIdolo AI Analytics Dashboard
</header>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Categories</h3>
  <button onclick="filter('tech')">Tech</button>
  <button onclick="filter('sports')">Sports</button>
  <button onclick="filter('orgs')">Organizations</button>
  <button onclick="filter('crypto')">Web3</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- STATS -->
<div class="stats">
  <div class="box">Total Profiles: 12</div>
  <div class="box">Avg Followers: 180M</div>
  <div class="box">Engagement: High 🔥</div>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input id="input" placeholder="Search X username...">
  <button onclick="search()">Search</button>
</div>

<div class="badge">Live Mock Analytics System</div>

<!-- RESULT -->
<div id="result" class="card" style="display:none;">
  <h2 id="name"></h2>
  <p id="handle"></p>

  <div class="grid">
    <div class="stat">Followers: <span id="followers"></span></div>
    <div class="stat">Following: <span id="following"></span></div>
    <div class="stat">Posts: <span id="posts"></span></div>
    <div class="stat">Growth: 🔺 +12%</div>
  </div>
</div>

<!-- LIST -->
<div class="card">
  <h3>🔥 Directory</h3>
  <ul id="list"></ul>
</div>

</div>
</div>

<script>
const data = {
  // tech
  elonmusk:{name:"Elon Musk",handle:"@elonmusk",followers:"180M",following:"500",posts:"25K",cat:"tech"},
  zuck:{name:"Mark Zuckerberg",handle:"@zuck",followers:"120M",following:"300",posts:"5K",cat:"tech"},
  gates:{name:"Bill Gates",handle:"@billgates",followers:"110M",following:"200",posts:"3K",cat:"tech"},

  // sports
  cristiano:{name:"Cristiano Ronaldo",handle:"@cristiano",followers:"620M",following:"600",posts:"3.5K",cat:"sports"},
  messi:{name:"Lionel Messi",handle:"@leomessi",followers:"500M",following:"400",posts:"2K",cat:"sports"},

  // orgs
  nasa:{name:"NASA",handle:"@nasa",followers:"95M",following:"100",posts:"80K",cat:"orgs"},
  who:{name:"WHO",handle:"@who",followers:"40M",following:"80",posts:"20K",cat:"orgs"},

  // crypto
  vitalik:{name:"Vitalik Buterin",handle:"@VitalikButerin",followers:"5M",following:"50",posts:"1K",cat:"crypto"},
};

let current = null;

function search(){
  const val = document.getElementById("input").value.toLowerCase();
  current = data[val];

  if(!current){
    alert("Not found in system");
    return;
  }

  document.getElementById("result").style.display="block";
  document.getElementById("name").innerText=current.name;
  document.getElementById("handle").innerText=current.handle;
  document.getElementById("followers").innerText=current.followers;
  document.getElementById("following").innerText=current.following;
  document.getElementById("posts").innerText=current.posts;
}

function filter(cat){
  let list = Object.values(data).filter(i=>i.cat===cat);
  document.getElementById("list").innerHTML =
    list.map(i=>"<li>"+i.name+" "+i.handle+"</li>").join("");
}
</script>

</body>
</html>
