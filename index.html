<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyIdolo App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f7f4ee;
  color: #1f2a37;
}

/* HEADER */
header {
  background: linear-gradient(90deg, #3aa0ff, #00c2ff);
  padding: 20px;
  text-align: center;
  color: white;
  font-size: 22px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* SEARCH */
.search-box {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  padding: 12px 18px;
  background: #3aa0ff;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* LIVE BADGE */
.badge {
  display: inline-block;
  padding: 5px 10px;
  background: #00c2ff;
  color: white;
  border-radius: 20px;
  font-size: 12px;
  margin-top: 10px;
}

/* CARDS */
.card {
  background: white;
  padding: 15px;
  margin-top: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.stat {
  background: #f2f6ff;
  padding: 15px;
  border-radius: 10px;
}

/* TRENDING */
.trending {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.tag {
  background: #3aa0ff;
  color: white;
  padding: 8px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
}

footer {
  text-align: center;
  margin-top: 30px;
  color: #777;
}
</style>
</head>

<body>

<header>
🚀 MyIdolo App
</header>

<div class="container">

<div class="search-box">
  <input id="input" placeholder="Search X user e.g. elonmusk">
  <button onclick="search()">Search</button>
</div>

<div class="badge">🔴 Live Mock Data</div>

<!-- TRENDING -->
<div class="card">
  <h3>🔥 Trending Idols</h3>
  <div class="trending">
    <div class="tag" onclick="quick('elonmusk')">Elon Musk</div>
    <div class="tag" onclick="quick('cristiano')">Cristiano</div>
    <div class="tag" onclick="quick('nasa')">NASA</div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="card" style="display:none;">
  <h2 id="name"></h2>
  <p id="handle"></p>

  <div class="grid">
    <div class="stat">Followers: <span id="followers"></span></div>
    <div class="stat">Following: <span id="following"></span></div>
    <div class="stat">Posts: <span id="posts"></span></div>
    <div class="stat">Engagement: 🔥 High</div>
  </div>

  <button onclick="save()">⭐ Save Idol</button>
</div>

<!-- SAVED -->
<div class="card">
  <h3>💾 Saved Idols</h3>
  <ul id="saved"></ul>
</div>

</div>

<footer>
MyIdolo App • Alpha Forge Global
</footer>

<script>
const data = {
  elonmusk: {name:"Elon Musk", handle:"@elonmusk", followers:"180M", following:"500", posts:"25K"},
  cristiano: {name:"Cristiano Ronaldo", handle:"@cristiano", followers:"620M", following:"600", posts:"3.5K"},
  nasa: {name:"NASA", handle:"@nasa", followers:"95M", following:"100", posts:"80K"}
};

let current = null;

function search(){
  const val = document.getElementById("input").value.toLowerCase();
  current = data[val] || {name:"Unknown", handle:"@"+val, followers:"N/A", following:"N/A", posts:"N/A"};

  document.getElementById("result").style.display="block";
  document.getElementById("name").innerText=current.name;
  document.getElementById("handle").innerText=current.handle;
  document.getElementById("followers").innerText=current.followers;
  document.getElementById("following").innerText=current.following;
  document.getElementById("posts").innerText=current.posts;
}

function quick(name){
  document.getElementById("input").value=name;
  search();
}

function save(){
  let list = JSON.parse(localStorage.getItem("saved") || "[]");
  list.push(current.name);
  localStorage.setItem("saved", JSON.stringify(list));
  renderSaved();
}

function renderSaved(){
  let list = JSON.parse(localStorage.getItem("saved") || "[]");
  document.getElementById("saved").innerHTML = list.map(i=>"<li>"+i+"</li>").join("");
}

renderSaved();
</script>

</body>
</html>
